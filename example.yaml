esphome:
  name: espSDCardLogger
  friendly_name: "SD Card Logger"
  min_version: 2026.04.0
  name_add_mac_suffix: false

esp32:
  board: lolin_s3_pro
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FATFS_LFN_HEAP: "y"   # heap-allocate LFN buffer, keeps task stacks safe
      CONFIG_FATFS_LFN: "2"        # 2 = heap allocation mode (1 = stack)
      CONFIG_FATFS_FS_EXFAT: "y"  # exFAT support for SDXC cards (>= 32 GB); FAT32 still works

external_components:
  - source: github://andrewbackway/esphome-sd_card_logger_web
    components: [sd_card, sd_logger, webserver_sd]

logger:
  baud_rate: 115200
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

web_server:
   version: 3

time:
  - platform: sntp
    id: sntp_time
    timezone: "Australia/Melbourne"
    servers:
      - pool.ntp.org

sd_card:
  id: sd_card_1
  cmd_pin: 11   # MOSI / CMD
  clk_pin: 12   # SCK  (onboard TF slot)
  data0_pin: 13 # MISO / DATA0
  mode_1bit: true  # only 3 lines physically wired on LOLIN S3 Pro



webserver_sd:
  id: file_server
  sd_card_id: sd_card_1
  url_prefix: "sdcard"
  sd_path: "/"
  enable_deletion: true
  enable_download: true
  enable_upload: true

sd_logger:
  id: sd_logger1
  sd_card_id: sd_card_1
  time_id: sntp_time
  queue_size: 50
  task_priority: 1
  # experimental features for cloud sync (not implemented yet)
  #fsync_interval: 30s
  #upload_url: "https://example.com/api/upload"
  #bearer_token: "TODO"
  #ping_url: "https://example.com/ping"
  #ping_interval: 60s
  #ping_timeout: 5s
  #backoff_initial: 30s
  #backoff_max: 15min
  sync_online:
    name: "Cloud Sync Online"
  sync_sending_backlog:
    name: "Cloud Sync Backlog"
  logs:
    - name: "Vehicle Data"
      folder: "vehicle"
      file_prefix: "vehicle"
      log_interval: 1s
      rotation: daily
      sensors:
        - sensor_id: engine_rpm
          format: "%.0f"
        - sensor_id: vehicle_speed
          format: "%.1f"
    - name: "Gear Log"
      folder: "gear"
      file_prefix: "gear"
      log_interval: 1s
      rotation: size
      max_file_size: 10485760
      text_sensors:
        - sensor_id: gear_pos

sensor:
  - platform: sd_card
    sd_card_id: sd_card_1
    type: used_space
    name: "SD Used (GB)"
    filters:
      - lambda: return (float)sd_card::convertBytes((uint64_t)x, sd_card::MemoryUnits::GigaByte);
  - platform: sd_card
    sd_card_id: sd_card_1
    type: total_space
    name: "SD Card Capacity (GB)"
    filters:
      - lambda: return (float)sd_card::convertBytes((uint64_t)x, sd_card::MemoryUnits::GigaByte);
  - platform: sd_card
    sd_card_id: sd_card_1
    type: free_space
    name: "SD Card Remaining (GB)"
    filters:
      - lambda: return (float)sd_card::convertBytes((uint64_t)x, sd_card::MemoryUnits::GigaByte);
  - platform: template
    id: engine_rpm
    name: "Engine RPM"
    unit_of_measurement: "rpm"
    accuracy_decimals: 0
    update_interval: 500ms
    lambda: "return (float)(millis() % 6000);"
  - platform: template
    id: vehicle_speed
    name: "Vehicle Speed"
    unit_of_measurement: "km/h"
    accuracy_decimals: 1
    update_interval: 500ms
    lambda: "return (float)((millis() / 1000) % 120);"
  - platform: template
    name: "Free Heap"
    unit_of_measurement: "B"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: "return (float)esp_get_free_heap_size();"

text_sensor:
  - platform: template
    id: gear_pos
    name: "Gear Position"
    update_interval: 1s
    lambda: |-
      static const char* gears[] = {"P","R","N","D","3","2","L"};
      return std::string(gears[(millis() / 5000) % 7]);
  - platform: sd_card
    sd_card_id: sd_card_1
    sd_card_type:
      name: "SD Card Type"

binary_sensor:
  - platform: template
    name: "SD Card Present"
    lambda: "return id(sd_card_1).is_directory(\"/\");"